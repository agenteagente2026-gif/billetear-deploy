<script>
/* ── Utils ── */
const q = id => document.getElementById(id);

async function fetchText(url) {
  // Intentamos 3 proxies distintos en orden
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];
  for (const u of proxies) {
    try {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), 9000);
      const r    = await fetch(u, { signal: ctrl.signal });
      clearTimeout(tid);
      if (r.ok) {
        const txt = await r.text();
        if (txt && txt.length > 50) return txt; // texto real
      }
    } catch { continue; }
  }
  return null;
}

async function fetchJSON(url) {
  const proxies = [url, `https://corsproxy.io/?url=${encodeURIComponent(url)}`, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
  for (const u of proxies) {
    try {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), 7000);
      const r    = await fetch(u, { signal: ctrl.signal });
      clearTimeout(tid);
      if (r.ok) return await r.json();
    } catch { continue; }
  }
  return null;
}

/* ── Auto-clasificar noticia por palabras clave en el título ── */
function classify(title) {
  const t = (title || '').toLowerCase();
  const AR = ['argentina','dólar','dollar','bcra','milei','inflaci','peso arg','corralito','cepo','indec','merval','anses','pami','kirchner','macri','kicillof','conicet','ypf','vaca muerta','patagonia','buenos aires','córdoba','rosario','mendoza','neuquén','lacunza','caputo','bausili','banco nacion'];
  const MK = ['bitcoin','btc','ethereum','eth','cripto','crypto','nasdaq','wall street','s&p 500','dow jones','bolsa','acciones','mercado financ','fed ','federal reserve','tasas','bonos del tesoro','oil ','petróleo','brent','oro ','gold ','fx ','forex','ipo ','trading','hedge fund','rally','bear market','bull market','meli','globant','aapl','nvidia','tesla','amazon'];
  if (AR.some(w => t.includes(w))) return 'AR';
  if (MK.some(w => t.includes(w))) return 'MERCADOS';
  return 'MUNDO';
}

/* ── Parsear RSS XML ── */
function parseRSS(xml, sourceName) {
  try {
    const doc   = new DOMParser().parseFromString(xml, 'text/xml');
    const items = [...doc.querySelectorAll('item')];
    return items.slice(0, 8).map(item => {
      const rawTitle = item.querySelector('title')?.textContent || '';
      const title = rawTitle
        .replace(/<!\[CDATA\[|\]\]>/g, '')
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
        .split(' - ')[0].trim();

      // Google News pone el link como nodo texto después de <link>
      let link = '';
      const linkEl = item.querySelector('link');
      if (linkEl) {
        link = (linkEl.nextSibling?.nodeValue || '').trim()
             || linkEl.textContent?.trim() || '';
      }
      const pub = item.querySelector('pubDate')?.textContent || '';
      return { title, link, pubDate: pub, src: sourceName, tag: classify(title) };
    }).filter(i => i.title && i.title.length > 10);
  } catch { return []; }
}

/* ═══════════════════════════════════════════════════
   FUENTES RSS
   Usamos SOLO Google News (muy confiable vía proxy)
   más algunos medios directos como refuerzo.
═══════════════════════════════════════════════════ */
const SOURCES = [
  // Google News — búsquedas específicas AR
  { url: 'https://news.google.com/rss/search?q=economia+argentina+dolar+bcra+milei&hl=es-419&gl=AR&ceid=AR:es-419', name: 'Google News', dot: 'dot1' },
  { url: 'https://news.google.com/rss/search?q=inflacion+argentina+indec+presupuesto&hl=es-419&gl=AR&ceid=AR:es-419', name: 'Google News', dot: 'dot1' },
  { url: 'https://news.google.com/rss/search?q=merval+acciones+argentina+bolsa+bonos&hl=es-419&gl=AR&ceid=AR:es-419', name: 'Google News', dot: 'dot1' },
  // Google News — mercados globales
  { url: 'https://news.google.com/rss/search?q=bitcoin+ethereum+crypto+mercado&hl=es-419&gl=AR&ceid=AR:es-419', name: 'Google News', dot: 'dot2' },
  { url: 'https://news.google.com/rss/search?q=wall+street+nasdaq+fed+acciones&hl=es-419&gl=AR&ceid=AR:es-419', name: 'Google News', dot: 'dot2' },
  { url: 'https://news.google.com/rss/search?q=economia+mundial+china+europa+recesion&hl=es-419&gl=AR&ceid=AR:es-419', name: 'Google News', dot: 'dot2' },
  // Medios argentinos directos (pueden fallar CORS, se intenta igual)
  { url: 'https://www.infobae.com/feeds/rss/economia/', name: 'Infobae', dot: 'dot3' },
  { url: 'https://www.ambito.com/rss/pages/economia.xml', name: 'Ámbito', dot: 'dot4' },
  { url: 'https://feeds.bbci.co.uk/mundo/rss.xml', name: 'BBC Mundo', dot: 'dot5' },
  { url: 'https://www.cronista.com/files-rss/summary.xml', name: 'El Cronista', dot: 'dot6' },
  { url: 'https://www.lanacion.com.ar/arcio/rss/category/economia/', name: 'La Nación', dot: 'dot7' },
];

let allNews    = [];
let activeTag  = 'todas';

/* ── Render ── */
function renderNews(items) {
  if (!items.length) {
    q('featuredWrap').innerHTML = '';
    q('newsGrid').innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-msg">No hay noticias para este filtro en este momento.</div></div>`;
    return;
  }

  const [top, ...rest] = items;
  const topTag = top.tag.toLowerCase();
  const topDate = top.pubDate
    ? new Date(top.pubDate).toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' })
    : '';

  q('featuredWrap').innerHTML = `
    <a class="news-featured featured-card" data-tag="${top.tag}" href="${top.link||'#'}" target="_blank" rel="noopener noreferrer">
      <div class="nf-badge">⭐ Destacada</div>
      <div class="nf-title">${top.title}</div>
      <div class="nf-meta">
        <span class="src-badge" data-src="${top.src}">${top.src}</span>
        <span class="tag ${topTag}">${top.tag}</span>
        <span>${topDate}</span>
      </div>
    </a>`;

  q('newsGrid').innerHTML = rest.slice(0, 24).map(item => {
    const tc = item.tag.toLowerCase();
    const date = item.pubDate
      ? new Date(item.pubDate).toLocaleDateString('es-AR', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
      : '';
    return `<a class="news-card" data-tag="${item.tag}" href="${item.link||'#'}" target="_blank" rel="noopener noreferrer">
      <div class="nc-top">
        <span class="src-badge" data-src="${item.src}">${item.src}</span>
        <span class="tag ${tc}">${item.tag}</span>
      </div>
      <div class="nc-title">${item.title}</div>
      <div class="nc-date">${date}</div>
    </a>`;
  }).join('');
}

function applyFilter(tag, btn) {
  activeTag = tag;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = tag === 'todas' ? allNews : allNews.filter(n => n.tag === tag);
  renderNews(filtered);
}

function updateCounts() {
  q('cntTodas').textContent    = allNews.length;
  q('cntAr').textContent       = allNews.filter(n=>n.tag==='AR').length;
  q('cntMercados').textContent = allNews.filter(n=>n.tag==='MERCADOS').length;
  q('cntMundo').textContent    = allNews.filter(n=>n.tag==='MUNDO').length;
}

/* ── Fetch noticias ── */
async function loadNews(manual = false) {
  if (manual) q('lastUpdate').textContent = 'Actualizando...';

  // Fetch todas las fuentes en paralelo
  const results = await Promise.allSettled(
    SOURCES.map(async src => {
      const xml = await fetchText(src.url);
      if (!xml) return { src: src.name, items: [], ok: false, dot: src.dot };
      const items = parseRSS(xml, src.name);
      return { src: src.name, items, ok: items.length > 0, dot: src.dot };
    })
  );

  // Actualizar indicadores de fuente
  const dotStatus = {};
  results.forEach(r => {
    if (r.status === 'fulfilled') {
      const { dot, ok } = r.value;
      if (!(dot in dotStatus)) dotStatus[dot] = ok;
      else dotStatus[dot] = dotStatus[dot] || ok;
    }
  });
  Object.entries(dotStatus).forEach(([id, ok]) => {
    const el = q(id);
    if (el) { el.classList.remove('loading'); el.style.background = ok ? 'var(--green)' : 'var(--red)'; }
  });

  // Juntar y deduplicar
  const flat = results.flatMap(r => r.status === 'fulfilled' ? r.value.items : []);
  const seen = new Set();
  allNews = flat
    .filter(i => {
      const key = i.title.slice(0, 60);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));

  if (allNews.length === 0) {
    q('lastUpdate').textContent = 'Sin conexión';
    q('featuredWrap').innerHTML = '';
    q('newsGrid').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-msg">No se pudo cargar ninguna fuente. Verificá tu conexión.</div></div>`;
    return;
  }

  updateCounts();
  const filtered = activeTag === 'todas' ? allNews : allNews.filter(n => n.tag === activeTag);
  renderNews(filtered);
  q('lastUpdate').textContent = 'En vivo · ' + new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });

  // Ticker desde dólares
  fetchJSON('https://dolarapi.com/v1/dolares').then(data => {
    if (!data) return;
    const html = data.map(d => `<span class="t-item"><span class="t-name">USD ${d.nombre}</span><span class="t-price neu">$\u202f${Number(d.venta).toLocaleString('es-AR')}</span></span>`).join('');
    q('tickerTrack').innerHTML = html + html;
  }).catch(() => {});
}

let currentFilter = 'all';
function filterNews(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cards = document.querySelectorAll('.news-card, .featured-card');
  cards.forEach(c => {
    if (tag === 'all') { c.style.display = ''; return; }
    const cardTag = c.dataset.tag || '';
    c.style.display = cardTag === tag ? '' : 'none';
  });
}

loadNews();
setInterval(() => loadNews(), 5 * 60 * 1000);

// ── Theme toggle ──
function toggleTheme(){
  const light=document.body.classList.toggle('light');
  localStorage.setItem('billetear-theme',light?'light':'dark');
  const btn=document.getElementById('themeBtn');
  if(btn)btn.textContent=light?'☀️':'🌙';
}
(function initTheme(){
  if(localStorage.getItem('billetear-theme')==='light'){
    document.body.classList.add('light');
    const btn=document.getElementById('themeBtn');
    if(btn)btn.textContent='☀️';
  }
})();

function triggerRefresh(){
  const btn=document.getElementById('refreshBtn');
  if(btn){btn.classList.add('refresh-spinning');setTimeout(()=>btn.classList.remove('refresh-spinning'),600);}
  loadNews(true);
}

// PWA: register service worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
