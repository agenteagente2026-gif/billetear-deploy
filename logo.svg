<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Billete/banknote shape -->
  <rect x="4" y="10" width="32" height="20" rx="3" stroke="#38bdf8" stroke-width="2" fill="none"/>
  <rect x="7" y="13" width="26" height="14" rx="1.5" stroke="#38bdf8" stroke-width="0.8" fill="none" opacity=".3"/>
  <!-- Sol de Mayo (simplified) -->
  <circle cx="20" cy="20" r="4" fill="#38bdf8"/>
  <circle cx="20" cy="20" r="2.5" fill="#0b0f1e"/>
  <circle cx="20" cy="20" r="1.5" fill="#38bdf8"/>
  <!-- Rays -->
  <g stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round">
    <line x1="20" y1="13" x2="20" y2="15"/>
    <line x1="20" y1="25" x2="20" y2="27"/>
    <line x1="13" y1="20" x2="15" y2="20"/>
    <line x1="25" y1="20" x2="27" y2="20"/>
    <line x1="15.05" y1="15.05" x2="16.46" y2="16.46"/>
    <line x1="23.54" y1="23.54" x2="24.95" y2="24.95"/>
    <line x1="24.95" y1="15.05" x2="23.54" y2="16.46"/>
    <line x1="16.46" y1="23.54" x2="15.05" y2="24.95"/>
  </g>
  <!-- Small $ signs -->
  <text x="10" y="22" font-size="5" fill="#38bdf8" opacity=".4" font-family="sans-serif" font-weight="700">$</text>
  <text x="28" y="22" font-size="5" fill="#38bdf8" opacity=".4" font-family="sans-serif" font-weight="700">$</text>
</svg>
